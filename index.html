            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Smooth expand animation */
        .activity-details {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .activity-details.open {
            max-height: 2000px;
            opacity: 1;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0d9488 100%);
        }

        .hero-gradient-snow {
            background: linear-gradient(135deg, #1e3a8a 0%, #64748b 50%, #cbd5e1 100%);
        }

        .hero-gradient-minimal {
            background: linear-gradient(135deg, #27272a 0%, #52525b 50%, #a1a1aa 100%);
        }

        .plan-btn.active {
            background-color: white;
            color: #1e40af;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-btn.active {

                    { name: "機票 (台北-雪梨)", cost: 23184, note: "國泰航空不選位" },
                    { name: "住宿 (6晚)", cost: 30000, note: "雪梨3晚+雪山3晚" },

            minimal: {

        // State

        // --- RENDER FUNCTIONS ---

        function updateCountdown() {
            const raceDate = new Date("2026-08-30T07:00:00+10:00").getTime();
            const now = new Date().getTime();
            const distance = raceDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            document.getElementById("countdown").innerHTML = `
                <div class="flex flex-col"><span class="text-3xl font-bold">${days}</span><span class="text-[10px] text-gray-300">DAYS</span></div>
                <div class="text-2xl pt-1">:</div>
                <div class="flex flex-col"><span class="text-3xl font-bold">${hours}</span><span class="text-[10px] text-gray-300">HRS</span></div>
                <div class="text-2xl pt-1 opacity-50 text-sm flex items-end pb-2">直到起跑</div>
            `;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        function renderItinerary() {
            const container = document.getElementById('app-container');
            const data = plans[currentPlan];

            let html = '<div class="space-y-4 pb-8 animate-fade-in">';

            data.forEach((day, index) => {
                const borderColor = day.highlight ? "border-l-4 border-yellow-400 ring-2 ring-yellow-400/20" : "";
                const hotelMapLink = day.hotel && day.hotel.name !== "無" && day.hotel.name !== "機上" && day.hotel.name !== "溫暖的家"
                    ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(day.hotel.name)}`
                    : '#';

                html += `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden ${borderColor} mb-4">
                    <!-- Card Header / Image -->
                    <div class="relative h-40 cursor-pointer group" onclick="toggleCard(${index})">
                        <img src="${day.image}" id="img-${index}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${day.title}">

                        <div class="absolute top-3 right-3 flex gap-2">
                            <div class="bg-white/20 backdrop-blur text-white p-2 rounded-full">
                                <i class="fa-solid ${day.icon}"></i>
                            </div>
                        </div>

                        <div class="absolute bottom-3 left-4 text-white">
                            <div class="flex items-center gap-2 mb-1">

                                <span class="text-[10px] uppercase tracking-wider opacity-90">${day.location}</span>
                            </div>
                            <h3 class="text-xl font-bold leading-tight">${day.title}</h3>
                        </div>
                    </div>

                    <!-- Collapsible Content -->
                    <div id="card-${index}" class="activity-details ${day.highlight ? 'open' : ''}"> 
                        <div class="p-5">
                            <p class="text-sm text-gray-500 mb-4 italic pl-3 border-l-2 border-gray-200">"${day.desc}"</p>
                            
                            <!-- Hotel Info Block -->
                            ${day.hotel ? `
                            <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100 flex items-start gap-3">
                                <div class="text-blue-500 mt-0.5"><i class="fa-solid fa-hotel"></i></div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start">
                                        <div class="text-xs text-gray-400 uppercase font-bold tracking-wider">住宿</div>
                                        ${hotelMapLink !== '#' ? `
                                        <a href="${hotelMapLink}" target="_blank" class="text-blue-500 bg-blue-50 p-1 rounded-md hover:bg-blue-100 active:scale-95 transition">
                                            <i class="fa-solid fa-location-dot text-xs"></i>
                                        </a>` : ''}
                                    </div>
                                    <div class="font-medium text-gray-800 text-sm mt-1">${day.hotel.name}</div>
                                    <div class="text-xs text-emerald-600 mt-1"><i class="fa-solid fa-coins mr-1"></i>${day.hotel.price}</div>
                                </div>
                            </div>
                            ` : ''}

                            <!-- Map Image for Race Day -->
                            ${day.mapImage ? `
                            <div class="mb-6 mt-2">
                                <div class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-2"><i class="fa-solid fa-map text-yellow-500 mr-1"></i>賽道路線圖</div>
                                <div class="rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <img src="${day.mapImage}" class="w-full h-auto object-cover" alt="Course Map">
                                </div>
                            </div>
                            ` : ''}

                            <!-- Activities List -->
                            ${day.activities && day.activities.length > 0 ? `
                            <div class="space-y-0 relative">
                                <div class="absolute left-[18px] top-2 bottom-4 w-0.5 bg-gray-100"></div>
                                ${day.activities.map(act => {
                    const mapLink = act.query ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.query)}` : '#';
                    return `
                                    <div class="flex gap-4 relative mb-4 last:mb-0">
                                        <div class="flex-none w-10 text-right pt-1 text-xs font-mono text-gray-400 bg-white z-10">${act.time || '-'}</div>
                                        <div class="flex-1 pb-2">
                                            <div class="flex justify-between items-start">
                                                <div class="font-medium text-gray-800 text-sm ${act.type === 'must' ? 'font-bold' : ''}">
                                                    ${act.type === 'must' ? '<i class="fa-solid fa-circle-exclamation text-red-500 text-xs mr-1"></i>' : ''}
                                                    ${act.text}
                                                </div>
                                                ${act.query ? `
                                                <a href="${mapLink}" target="_blank" class="flex-none ml-2 text-blue-500 bg-blue-50 p-1.5 rounded-lg hover:bg-blue-100 transition">
                                                    <i class="fa-solid fa-location-arrow text-xs"></i>
                                                </a>` : ''}
                                            </div>
                                            <div class="flex flex-wrap gap-2 mt-1">
                                                <div class="text-xs text-emerald-600 font-medium bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">
                                                    <i class="fa-solid fa-coins mr-1 text-[10px]"></i>${act.cost}
                                                </div>
                                                ${act.note ? `<div class="text-xs text-orange-600 bg-orange-50 px-2 py-0.5 rounded border border-orange-100"><i class="fa-solid fa-circle-info mr-1"></i>${act.note}</div>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                    `;
                }).join('')}
                            </div>
                            ` : `
                            <div class="text-sm text-gray-400 text-center py-4 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                                無特殊預定行程，以飯店休息為主
                            </div>
                            `}
                        </div>
                    </div>
                    
                    <div class="text-center py-2 border-t border-gray-50 bg-gray-50 cursor-pointer hover:bg-gray-100" onclick="toggleCard(${index})">
                        <i class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform duration-300" id="chevron-${index}"></i>
                    </div>
                </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderChecklist() {
            const container = document.getElementById('app-container');
            const list = currentPlan === 'reef' ? checklistReef : (currentPlan === 'snow' ? checklistSnow : checklistMinimal);

            let titleStr = currentPlan === 'reef' ? '大堡礁' : (currentPlan === 'snow' ? '雪山' : '極簡跑馬');

            let html = '<div class="space-y-6 pb-8 bg-white p-6 rounded-2xl shadow-sm animate-fade-in">';
            html += `<h2 class="text-xl font-bold text-gray-800 mb-4">🎒 ${titleStr} 必備行囊清單</h2>`;

            list.forEach((cat, idx) => {
                html += `
                <div class="mb-6 last:mb-0">
                    <h3 class="text-sm font-bold text-blue-600 uppercase tracking-wide mb-3 border-b pb-1">${cat.cat}</h3>
                    <ul class="space-y-3">
                        ${cat.items.map((item, i) => `
                        <li class="flex items-center gap-3 group cursor-pointer" onclick="toggleCheck(this)">
                            <div class="w-5 h-5 rounded border-2 border-gray-300 flex items-center justify-center text-white transition-colors group-hover:border-blue-400 check-box">
                                <i class="fa-solid fa-check text-xs"></i>
                            </div>
                            <span class="text-gray-700 text-sm transition-all check-text select-none">${item}</span>
                        </li>
                        `).join('')}
                    </ul>
                </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderBudget() {
            const container = document.getElementById('app-container');
            const data = budgets[currentPlan];
            let planName = currentPlan === 'reef' ? '方案A (大堡礁)' : (currentPlan === 'snow' ? '方案B (雪山)' : '方案C (極簡跑馬)');

            let html = `
            <div class="space-y-6 pb-8 animate-fade-in">
                
                <!-- Flight Card -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-green-700">
                    <div class="flex items-center gap-2 mb-4">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/Cathay_Pacific_logo.svg/1200px-Cathay_Pacific_logo.svg.png" class="h-6 object-contain" alt="Cathay Pacific">
                        <h2 class="text-lg font-bold text-gray-800">國泰航空 航班資訊</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <!-- Outbound -->
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <div class="text-xs text-gray-500 font-bold mb-2 flex justify-between">
                                <span><i class="fa-solid fa-plane-departure mr-1 text-blue-500"></i>去程 | 8/26 (三)</span>
                                <span>總飛行 12h</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <div class="text-center">
                                    <div class="font-bold text-xl text-gray-800">16:10</div>
                                    <div class="text-gray-500">TPE 桃園</div>
                                </div>
                                <div class="flex-1 px-4 text-center relative">
                                    <div class="border-t-2 border-dashed border-gray-300 w-full absolute top-1/2 left-0 -z-10"></div>
                                    <div class="bg-gray-50 px-2 inline-block text-xs text-orange-600 font-medium">香港轉機 55m</div>
                                </div>
                                <div class="text-center">
                                    <div class="font-bold text-xl text-gray-800">06:10<span class="text-[10px] text-red-500 relative -top-2">+1</span></div>
                                    <div class="text-gray-500">SYD 雪梨</div>
                                </div>
                            </div>
                        </div>

                        <!-- Inbound -->
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <div class="text-xs text-gray-500 font-bold mb-2 flex justify-between">
                                <span><i class="fa-solid fa-plane-arrival mr-1 text-blue-500"></i>回程 | 9/1 (二)</span>
                                <span>總飛行 13h 10m</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <div class="text-center">
                                    <div class="font-bold text-xl text-gray-800">10:10</div>
                                    <div class="text-gray-500">SYD 雪梨</div>
                                </div>
                                <div class="flex-1 px-4 text-center relative">
                                    <div class="border-t-2 border-dashed border-gray-300 w-full absolute top-1/2 left-0 -z-10"></div>
                                    <div class="bg-gray-50 px-2 inline-block text-xs text-orange-600 font-medium">香港轉機 1h35m</div>
                                </div>
                                <div class="text-center">
                                    <div class="font-bold text-xl text-gray-800">21:20</div>
                                    <div class="text-gray-500">TPE 桃園</div>
                                </div>
                            </div>
                            <div class="mt-2 text-[10px] text-red-500 bg-red-50 px-2 py-1 rounded inline-block">
                                <i class="fa-solid fa-circle-exclamation mr-1"></i>備註：9/1 無雪梨直飛台灣航班
                            </div>
                        </div>

                        <!-- Price -->
                        <div class="flex gap-2 pt-2">
                            <div class="flex-1 bg-blue-50 p-3 rounded-lg border border-blue-100 text-center">
                                <div class="text-xs text-blue-600 mb-1">一般座位</div>
                                <div class="font-bold text-gray-800">TWD $23,184</div>
                            </div>
                            <div class="flex-1 bg-amber-50 p-3 rounded-lg border border-amber-100 text-center">
                                <div class="text-xs text-amber-700 mb-1">寬敞座位</div>
                                <div class="font-bold text-gray-800">TWD $34,704</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Budget Card -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5">
                        <i class="fa-solid fa-file-invoice-dollar text-8xl"></i>
                    </div>
                    <div class="relative z-10">
                        <h2 class="text-lg font-bold text-gray-800 mb-1">預估花費明細</h2>
                        <div class="text-sm text-gray-500 mb-5">目前選擇：${planName}</div>
                        
                        <div class="space-y-3 mb-6">
                            ${data.items.map(item => `
                            <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                                <div>
                                    <div class="text-sm font-medium text-gray-700">${item.name}</div>
                                    <div class="text-[10px] text-gray-400">${item.note}</div>
                                </div>
                                <div class="text-sm font-mono font-bold text-gray-800">
                                    $${item.cost.toLocaleString()}
                                </div>
                            </div>
                            `).join('')}
                        </div>

                        <div class="bg-gray-800 text-white p-4 rounded-xl flex justify-between items-center">
                            <div class="text-sm opacity-80 uppercase tracking-widest">Total Estimated</div>
                            <div class="text-2xl font-bold font-mono text-emerald-400">
                                <span class="text-sm mr-1">TWD</span>$${data.total.toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            `;
            container.innerHTML = html;
        }

        // --- INTERACTION FUNCTIONS ---

        function switchPlan(plan) {
            currentPlan = plan;

            // Update Toggle Buttons
            document.querySelectorAll('.plan-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-plan-${plan}`).classList.add('active');

            // Update Header Theme
            const header = document.getElementById('hero-header');
            const subtitle = document.getElementById('trip-subtitle');

            header.className = "text-white p-6 rounded-b-3xl shadow-lg relative overflow-hidden transition-colors duration-500";

            if (plan === 'snow') {
                header.classList.add('hero-gradient-snow');
                subtitle.innerText = "澳洲最高峰之旅";
            } else if (plan === 'minimal') {
                header.classList.add('hero-gradient-minimal');
                subtitle.innerText = "極簡跑馬之旅";
            } else {
                header.classList.add('hero-gradient');
                subtitle.innerText = "大堡礁之旅";
            }

            // Re-render current tab
            if (currentTab === 'itinerary') renderItinerary();
            else if (currentTab === 'checklist') renderChecklist();
            else if (currentTab === 'budget') renderBudget();
        }

        function switchTab(tab) {
            currentTab = tab;

            // Update buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active', 'text-blue-600', 'text-gray-400');
                if (btn.id === `btn-${tab}`) {
                    btn.classList.add('active', 'text-blue-600');
                } else {
                    btn.classList.add('text-gray-400');
                }
            });

            // Render content
            if (tab === 'itinerary') renderItinerary();
            else if (currentTab === 'checklist') renderChecklist();
            else if (currentTab === 'budget') renderBudget();
        }

        function toggleCard(index) {
            const content = document.getElementById(`card-${index}`);
            const chevron = document.getElementById(`chevron-${index}`);

            if (content.classList.contains('open')) {
                content.classList.remove('open');
                chevron.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                chevron.style.transform = 'rotate(180deg)';
            }
        }

        function toggleCheck(el) {
            const box = el.querySelector('.check-box');
            const text = el.querySelector('.check-text');

            if (box.classList.contains('bg-blue-500')) {
                box.classList.remove('bg-blue-500', 'border-blue-500');
                box.classList.add('border-gray-300');
                text.classList.remove('line-through', 'text-gray-400');
                text.classList.add('text-gray-700');
            } else {
                box.classList.remove('border-gray-300');
                box.classList.add('bg-blue-500', 'border-blue-500');
                text.classList.add('line-through', 'text-gray-400');
                text.classList.remove('text-gray-700');
            }
        }

        // Initialize
        renderItinerary();

    </script>
