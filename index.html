<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Run & Sydney 2026 旅程規劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .activity-details {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .activity-details.open {
            max-height: 2000px;
            opacity: 1;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hero-gradient-minimal {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        }

        .nav-btn.active {
            color: #ea580c;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="pb-24">

    <header id="hero-header"
        class="hero-gradient-minimal text-white p-6 rounded-b-3xl shadow-lg relative overflow-hidden">
        <div class="absolute top-0 right-0 opacity-10 pointer-events-none">
            <i class="fa-solid fa-person-running text-9xl transform translate-x-10 -translate-y-4"></i>
        </div>

        <div class="relative z-10">
            <div class="flex items-center gap-2 mb-2 opacity-80 text-sm">

            </div>
            <h1 class="text-3xl font-bold mb-1">雪梨馬拉松 <br>& <span id="trip-subtitle">城市奔跑之旅</span></h1>

            <div class="mt-6 bg-white/10 backdrop-blur-md rounded-xl p-4 border border-white/10">

                <div class="flex justify-between text-center font-mono" id="countdown">
                    <div class="animate-pulse">計算中...</div>
                </div>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto pt-6" id="app-container">
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav z-50 max-w-2xl mx-auto">
        <div class="flex justify-around items-center h-16 pb-safe">
            <button onclick="switchTab('itinerary')"
                class="nav-btn active flex-1 flex flex-col items-center justify-center transition-colors"
                id="btn-itinerary">
                <i class="fa-solid fa-map-location-dot text-xl mb-1"></i>

            <button onclick="switchTab('checklist')"

                <i class="fa-solid fa-sack-dollar text-xl mb-1"></i>
                <span class="text-[10px] font-medium">預算</span>
            </button>

    </nav>

        function updateCountdown() {
            const raceDate = new Date("2026-08-30T07:00:00+10:00").getTime();
            const now = new Date().getTime();
            const distance = raceDate - now;
            if (distance < 0) return;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            document.getElementById("countdown").innerHTML = `
                <div class="flex flex-col"><span class="text-3xl font-bold">${days}</span><span class="text-[10px] text-gray-300">DAYS</span></div>
                <div class="text-2xl pt-1">:</div>
                <div class="flex flex-col"><span class="text-3xl font-bold">${hours}</span><span class="text-[10px] text-gray-300">HRS</span></div>
                <div class="text-2xl pt-1 opacity-50 text-sm flex items-end pb-2">直到起跑</div>
            `;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

                        <img src="${day.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                        <div class="absolute top-3 right-3 flex gap-2">

                        </div>
                        <div class="absolute bottom-3 left-4 text-white">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold bg-white/20 px-2 py-0.5 rounded backdrop-blur-sm">${day.date}</span>
                                <span class="text-[10px] uppercase tracking-wider opacity-90">${day.location}</span>
                            </div>
                            <h3 class="text-xl font-bold leading-tight">${day.title}</h3>
                        </div>
                    </div>
                    <div id="card-${index}" class="activity-details ${day.highlight ? 'open' : ''}">
                        <div class="p-5">
                            <p class="text-sm text-gray-500 mb-4 italic pl-3 border-l-2 border-orange-200">"${day.desc}"</p>
                            ${day.hotel && day.hotel.name !== "-" ? `
                            <div class="mb-4 bg-orange-50/30 p-3 rounded-lg border border-orange-100">
                                <div class="text-xs text-orange-400 uppercase font-bold tracking-wider mb-1">住宿</div>
                                <div class="font-medium text-gray-800 text-sm flex items-center gap-2">
                                    ${day.hotel.name}
                                    ${day.hotel.map ? `<a href="${day.hotel.map}" target="_blank" rel="noopener noreferrer" class="text-orange-500"><i class="fa-solid fa-map-location-dot"></i></a>` : ''}
                                    ${day.hotel.website ? `<a href="${day.hotel.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500"><i class="fa-solid fa-globe"></i></a>` : ''}
                                </div>
                                <div class="text-xs text-emerald-600 font-bold mt-1">${day.hotel.price}</div>
                            </div>
                            ` : ''}
                            ${day.mapImage ? `<div class="mb-6 mt-2"><div class="text-xs text-gray-400 uppercase font-bold tracking-wider mb-2">賽道路線</div><img src="${day.mapImage}" class="w-full rounded-lg border border-gray-200"></div>` : ''}

                                <div class="absolute left-[18px] top-2 bottom-4 w-0.5 bg-gray-100"></div>
                                ${day.activities.map(act => `
                                    <div class="flex gap-4 relative">
                                        <div class="flex-none w-10 text-right pt-1 text-xs font-mono text-gray-400 bg-white z-10">${act.time || '-'}</div>
                                        <div class="flex-1">
                                            <div class="flex justify-between items-start">
                                                <div class="font-medium text-gray-800 text-sm flex items-center gap-2">
                                                    ${act.text}
                                                    ${act.type === 'miniRun' ? `
                                                        <a href="${miniMarathon.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500">
                                                            <i class="fa-solid fa-globe"></i>
                                                        </a>
                                                    ` : ''}

                                                ${act.query ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.query)}" target="_blank" rel="noopener noreferrer" class="text-orange-500"><i class="fa-solid fa-location-arrow text-xs"></i></a>` : ''}

                                        </div>
                                    </div>

                            </div>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html + '</div>';
        }

                    </ul></div>`;
            });
            container.innerHTML = html + '</div>';
        }

                            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 text-center">
                                <div class="text-xs text-blue-600 mb-1">機票</div>
                                <div class="font-bold text-gray-800">TWD $${flightPrice.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5">
                        <i class="fa-solid fa-file-invoice-dollar text-8xl"></i>
                    </div>
                    <div class="relative z-10">
                        <h2 class="text-lg font-bold text-gray-800 mb-1">預估花費明細</h2>
                        <div class="text-sm text-gray-500 mb-5">目前選擇：${planName}</div>
                        
                        <div class="space-y-3 mb-6">
                            ${data.items.map(item => `
                            <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                                <div>
                                    <div class="text-sm font-medium text-gray-700 flex items-center gap-2">
                                        ${item.name}
                                        ${item.linkType === 'hotel' ? `
                                            <a href="${hotelInfo.map}" target="_blank" rel="noopener noreferrer" class="text-orange-500">
                                                <i class="fa-solid fa-map-location-dot"></i>
                                            </a>
                                            <a href="${hotelInfo.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500">
                                                <i class="fa-solid fa-globe"></i>
                                            </a>
                                        ` : ''}
                                        ${item.linkType === 'mini' ? `
                                            <a href="${miniMarathon.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500">
                                                <i class="fa-solid fa-globe"></i>
                                            </a>
                                        ` : ''}
                                    </div>
                                    <div class="text-[10px] text-gray-400">${item.note}</div>
                                </div>
                                <div class="text-sm font-mono font-bold ${item.costStr ? 'text-gray-500' : 'text-gray-800'}">
                                    ${item.costStr ? item.costStr : '$' + item.cost.toLocaleString()}
                                </div>
                            </div>
                            `).join('')}
                        </div>

                        <div class="bg-slate-800 text-white p-4 rounded-xl shadow-lg">
                            <div class="text-[10px] opacity-80 uppercase tracking-widest mb-1">
                                <i class="fa-solid fa-plane mr-1"></i>總花費
                            </div>
                            <div class="text-xl font-bold font-mono text-emerald-400 leading-none">
                                <span class="text-xs mr-1 font-sans font-normal opacity-70">TWD</span>
                                $${total.toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            `;
            container.innerHTML = html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active', 'text-orange-600');
                btn.classList.add('text-gray-400');
                if (btn.id === `btn-${tab}`) btn.classList.add('active', 'text-orange-600');
            });

            if (tab === 'itinerary') renderItinerary();
            else if (tab === 'checklist') renderChecklist();
            else if (tab === 'budget') renderBudget();
        }

        function toggleCard(index) {
            const content = document.getElementById(`card-${index}`);
            content.classList.toggle('open');
        }

        function toggleCheck(el) {
            const box = el.querySelector('.check-box');
            const text = el.querySelector('.check-text');
            box.classList.toggle('bg-orange-500');
            box.classList.toggle('border-orange-500');
            text.classList.toggle('line-through');
            text.classList.toggle('text-gray-400');
        }

        renderItinerary();
    </script>
</body>

</html>
